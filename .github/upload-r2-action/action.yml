name: 'Upload to R2'
description: 'Upload database files to root and package files to packages/'
inputs:
  aws-bucket:
    description: 'R2 bucket name'
    required: true
  aws-access-key-id:
    description: 'R2 access key ID'
    required: true
  aws-secret-access-key:
    description: 'R2 secret access key'
    required: true
  aws-endpoint:
    description: 'R2 S3-compatible endpoint URL'
    required: true
  source-dir:
    description: 'Source directory to upload'
    required: true
    default: './repo'
runs:
  using: 'composite'
  steps:
    - name: Install boto3
      run: pip install boto3
      shell: bash
    - name: Upload files to R2
      run: python ${{ github.action_path }}/upload_r2.py
      shell: bash
      env:
        AWS_S3_BUCKET: ${{ inputs.aws-bucket }}
        AWS_ACCESS_KEY_ID: ${{ inputs.aws-access-key-id }}
        AWS_SECRET_ACCESS_KEY: ${{ inputs.aws-secret-access-key }}
        AWS_S3_ENDPOINT: ${{ inputs.aws-endpoint }}
        SOURCE_DIR: ${{ inputs.source-dir }}
